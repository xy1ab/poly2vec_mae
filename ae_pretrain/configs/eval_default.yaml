# AE 重建可视化默认配置（对应 `scripts/run_eval.py`）。
# 说明：
# 1) 优先推荐通过 `model_dir` 指向 exports 下完整模型目录。
# 2) 命令行同名参数会覆盖此处配置。
# 3) 频域参数默认由模型 config 自动读取；如需强制覆盖，可在命令行显式传入。

# 样本选择参数
row_index: 0
data_dir: ./data/processed/hangzhou
spatial_size: 256

# 模型目录（建议改为你要评估的 export 目录）
model_dir: ./outputs/exports/ae_20260407_1200

# AE 推理参数
precision: bf16
# device: cuda

# 可视化输出目录（默认）
save_dir: ./outputs/viz
