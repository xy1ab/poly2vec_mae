# MAE 预训练默认配置（polygon 版本）。
# 该文件中的字段会直接映射到 `src/engine/trainer.py` 参数。

# =========================
# 任务与几何类型
# =========================
# 训练类型标识，仅用于运行目录命名和日志区分。
train_type: mae
# 几何类型。当前实现为 polygon，后续可扩展 point/line。
geom_type: polygon

# =========================
# 数据与输出路径
# =========================
# 预处理后的训练数据目录；脚本会自动扫描其中所有 `.pt` 分片。
data_dir: ./data/processed/hangzhou
# 数据读取策略：`eager` 表示一次性全部载入内存，`lazy` 表示按 shard 按需读取。
load_mode: eager
# 训练输出根目录；脚本会自动创建 `<save_dir>/<run_timestamp>/best` 和 `ckpt`。
save_dir: ./outputs/ckpt

# =========================
# 运行环境
# =========================
# 可见 GPU，单卡写 "0"，多卡写 "0,1,2,3"。
gpu: "0,1,2,3,4,5,6,7"
# DataLoader 的 worker 数量。
num_workers: 4

# =========================
# 复现性
# =========================
# 全局随机种子（训练过程）。
seed: 42
# 训练/验证切分随机种子。
split_seed: 42
# 是否启用强确定性（会牺牲部分性能）。
deterministic: false

# =========================
# 损失项权重
# =========================
# 频域幅值损失权重。
weight_mag: 5.0
# 高频区域幅值损失附加权重。
weight_mag_hf: 1.0
# 相位损失权重。
weight_phase: 1.0

# =========================
# 优化与学习率调度
# =========================
# 验证集比例（从训练集中切分）。
val_ratio: 0.05
# warmup 轮数；设为 0 表示不 warmup。
warmup_epochs: 20
# 学习率下界（cosine 退火最小值）。
min_lr: 1.0e-6

# =========================
# Polygon 频域参数
# =========================
# 频率采样数量（越大表示频域网格越密）。
pos_freqs: 63
# 最小频率。
w_min: 0.1
# 最大频率。
w_max: 200.0
# 频率采样策略（当前支持 geometric）。
freq_type: geometric
# CFT 逐三角频域积分的分块大小；过大容易造成 GPU 瞬时显存峰值过高。
cft_triangle_chunk_size: 256
# ICFT 空间重建的分块大小；用于避免可视化阶段一次性构造超大 [freq, space] 基函数矩阵。
icft_spatial_chunk_size: 256

# =========================
# 模型结构（ViT-MAE）
# =========================
# patch 边长，需与频域网格尺寸匹配。
patch_size: 8
# 编码器 token 维度。
embed_dim: 128
# 编码器层数。
depth: 8
# 编码器注意力头数。
num_heads: 2

# 解码器 token 维度。
dec_embed_dim: 256
# 解码器层数。
dec_depth: 16
# 解码器注意力头数。
dec_num_heads: 4

# =========================
# 训练超参数
# =========================
# 总训练轮数。
epochs: 200
# batch size（按单进程计算，DDP 下为每进程 batch）。
batch_size: 256
# 初始学习率。
lr: 1.5e-4
# AdamW 权重衰减。
weight_decay: 0.05
# MAE mask 比例。
mask_ratio: 0.1
# 损失模式：`full` 为全图重构损失，`mask` 为原 MAE 的 masked-only 损失。
loss_mode: full
# 数据增强重复次数（仅训练集）。
augment_times: 1

# =========================
# 精度策略
# =========================
# 训练计算精度：支持 fp32 / bf16 / fp16。
# A800 上优先建议 bf16 以兼顾收敛稳定性与吞吐。
precision: fp32
# 检查点落盘精度：支持 fp32 / bf16 / fp16。
checkpoint_dtype: fp32

# =========================
# 保存与日志
# =========================
# 每 N 个 epoch 进行一次评测；评测时才会输出 val loss、PNG 与续训断点。
eval_every: 5
# 每 N 个 step 打印一次训练日志。
log_interval: 50
